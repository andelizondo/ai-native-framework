merge_queue:
  max_parallel_checks: 1

queue_rules:
  # release-please opens branches named release-please--* (changelog / version bump only).
  # Dashboard test, e2e (Vercel preview), and Qodo Code Review are not required for this path.
  - name: release-please
    batch_size: 1
    merge_method: squash
    update_method: rebase
    queue_conditions:
      - base = main
      - head ~= ^release-please
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = decide
    merge_conditions:
      - base = main
      - head ~= ^release-please
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = decide

  # staging → main promotion. Uses regular merge (not squash) to preserve
  # conventional commit history so release-please can detect feat/fix/breaking signals.
  # No separate code review required when CI is green; code was already reviewed on staging.
  #
  # `migrate-staging` is required: the data tier of the 3-tier environment model
  # (see ai/playbooks/environment-separation.md Database tier section). The
  # promotion PR's head SHA is the latest staging commit, and the
  # supabase-migrate workflow's `migrate-staging` job runs on push to staging.
  # Requiring this check here means we cannot promote app code that depends on
  # a migration that failed (or never reached) the staging Supabase project.
  - name: staging-promotion
    batch_size: 1
    merge_method: merge
    update_method: rebase
    queue_conditions:
      - base = main
      - head = staging
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = decide
      - check-success = migrate-staging
    merge_conditions:
      - base = main
      - head = staging
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = decide
      - check-success = migrate-staging

  # Back-merge of main into staging after a production release. Carries no new
  # code (only commits already merged through their own reviewed PRs: the
  # staging → main promotion and release-please's chore:release commit). Uses
  # the merge method (not squash) so main remains an ancestor of staging and
  # the next promotion PR is not BEHIND. Skips heavy checks because they would
  # only re-validate already-shipped commits. The branch-name pattern is set
  # by .github/workflows/back-merge-to-staging.yml; manual back-merges should
  # follow the same naming so they hit this queue (or be admin-merged directly
  # per ai/playbooks/publish-to-production.md §8).
  - name: back-merge-to-staging
    batch_size: 1
    merge_method: merge
    update_method: rebase
    # Branch-name match alone is not a strong identity guard — anyone (or any
    # automation) could push `chore/back-merge-main-after-foo` and inherit the
    # check-skipping behaviour. The combined guards below require the PR to
    # carry the `residual:low` label AND a title that exactly matches the
    # workflow's template, which the workflow always sets together. Manual
    # back-merges per `ai/playbooks/publish-to-production.md` §8 follow the
    # same naming/label/title convention so they hit this queue too.
    queue_conditions:
      - base = staging
      - head ~= ^chore/back-merge-main-after-
      - label = residual:low
      # YAML quoting required: the colon in `chore:` would otherwise be parsed
      # as a mapping key, silently invalidating the whole queue config and
      # causing Mergify to fall through to `staging-integration` (which is
      # exactly how PR #110 was squash-merged and broke ancestry).
      - "title ~= ^chore: back-merge main into staging after release"
      - -draft
      - -label = sync:needed
    merge_conditions:
      - base = staging
      - head ~= ^chore/back-merge-main-after-
      - label = residual:low
      - "title ~= ^chore: back-merge main into staging after release"
      - -draft
      - -label = sync:needed

  # Feature PRs targeting staging (integration branch). The negative condition
  # on `head` keeps back-merge branches off this squash queue — they belong on
  # `back-merge-to-staging` so the second parent is preserved.
  #
  # NOTE: Mergify negation uses the `-` prefix on the whole condition, NOT
  # `!~=`. An earlier version of this file used `head !~= ^chore/back-merge-...`
  # which Mergify silently treated as a no-op, causing the back-merge PR #110
  # to be admitted to this squash queue and break ancestry. Always use the
  # `-` prefix for negation.
  - name: staging-integration
    batch_size: 1
    merge_method: squash
    update_method: rebase
    queue_conditions:
      - base = staging
      - -head ~= ^chore/back-merge-main-after-
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = e2e
      - check-success = decide
      - check-success = migrate-validate
    merge_conditions:
      - base = staging
      - -head ~= ^chore/back-merge-main-after-
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = e2e
      - check-success = decide
      - check-success = migrate-validate

  - name: low-risk
    batch_size: 1
    merge_method: squash
    update_method: rebase
    queue_conditions:
      - base = main
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = e2e
      - check-success = decide
    merge_conditions:
      - base = main
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = e2e
      - check-success = decide

merge_protections_settings:
  reporting_method: check-runs
  auto_merge_conditions: true
