merge_queue:
  max_parallel_checks: 1

queue_rules:
  # release-please opens branches named release-please--* (changelog / version bump only).
  # Dashboard test, e2e (Vercel preview), and CodeRabbit are not required for this path.
  - name: release-please
    autoqueue: true
    batch_size: 1
    merge_method: squash
    update_method: rebase
    queue_conditions:
      - base = main
      - head ~= ^release-please
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = decide
    merge_conditions:
      - base = main
      - head ~= ^release-please
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = decide

  # staging → main promotion. Uses regular merge (not squash) to preserve
  # conventional commit history so release-please can detect feat/fix/breaking signals.
  # No separate code review required when CI is green; code was already reviewed on staging.
  - name: staging-promotion
    autoqueue: true
    batch_size: 1
    merge_method: merge
    update_method: rebase
    queue_conditions:
      - base = main
      - head = staging
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = decide
    merge_conditions:
      - base = main
      - head = staging
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = decide

  # Back-merge of main into staging after a production release. Carries no new
  # code (only commits already merged through their own reviewed PRs: the
  # staging → main promotion and release-please's chore:release commit). Uses
  # the merge method (not squash) so main remains an ancestor of staging and
  # the next promotion PR is not BEHIND. Skips heavy checks because they would
  # only re-validate already-shipped commits. The branch-name pattern is set
  # by .github/workflows/back-merge-to-staging.yml; manual back-merges should
  # follow the same naming so they hit this queue (or be admin-merged directly
  # per ai/playbooks/publish-to-production.md §8).
  - name: back-merge-to-staging
    autoqueue: true
    batch_size: 1
    merge_method: merge
    update_method: rebase
    queue_conditions:
      - base = staging
      - head ~= ^chore/back-merge-main-after-
      - -draft
      - -label = sync:needed
    merge_conditions:
      - base = staging
      - head ~= ^chore/back-merge-main-after-
      - -draft
      - -label = sync:needed

  # Feature PRs targeting staging (integration branch). The negative condition
  # on `head` keeps back-merge branches off this squash queue — they belong on
  # `back-merge-to-staging` so the second parent is preserved.
  - name: staging-integration
    autoqueue: true
    batch_size: 1
    merge_method: squash
    update_method: rebase
    queue_conditions:
      - base = staging
      - head !~= ^chore/back-merge-main-after-
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = e2e
      - check-success = CodeRabbit
      - check-success = decide
    merge_conditions:
      - base = staging
      - head !~= ^chore/back-merge-main-after-
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = e2e
      - check-success = CodeRabbit
      - check-success = decide

  - name: low-risk
    autoqueue: true
    batch_size: 1
    merge_method: squash
    update_method: rebase
    queue_conditions:
      - base = main
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = e2e
      - check-success = CodeRabbit
      - check-success = decide
    merge_conditions:
      - base = main
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = e2e
      - check-success = CodeRabbit
      - check-success = decide

merge_protections_settings:
  reporting_method: check-runs
