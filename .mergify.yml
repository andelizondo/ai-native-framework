merge_queue:
  max_parallel_checks: 1

queue_rules:
  # release-please opens branches named release-please--* (changelog / version bump only).
  # Dashboard test, e2e (Vercel preview), and CodeRabbit are not required for this path.
  - name: release-please
    autoqueue: true
    batch_size: 1
    merge_method: squash
    update_method: rebase
    queue_conditions:
      - base = main
      - head ~= ^release-please
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = decide
    merge_conditions:
      - base = main
      - head ~= ^release-please
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = decide
  - name: low-risk
    autoqueue: true
    batch_size: 1
    merge_method: squash
    update_method: rebase
    queue_conditions:
      - base = main
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = e2e
      - check-success = CodeRabbit
      - check-success = decide
    merge_conditions:
      - base = main
      - label = residual:low
      - -draft
      - -label = sync:needed
      - check-success = validate
      - check-success = test
      - check-success = e2e
      - check-success = CodeRabbit
      - check-success = decide
merge_protections_settings:
  reporting_method: check-runs
