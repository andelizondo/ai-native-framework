# Supabase CLI configuration for the dashboard product.
#
# The hosted project id is intentionally NOT pinned here. CI links to the
# correct project per environment via `supabase link --project-ref ...` using
# the `SUPABASE_PROJECT_REF` secret scoped to the GitHub environment
# (`staging` or `production`). See `.github/workflows/supabase-migrate.yml`
# and `ai/playbooks/environment-separation.md` (Database tier section).
#
# Values below tune the local stack only (`supabase start`). They do not
# affect hosted projects.

project_id = "ai-native-framework-dashboard"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Match the hosted projects' Postgres major version so local reset/db-push
# behaviour mirrors production. Both `ai-native-framework` (production) and
# `ai-native-framework-staging` run Postgres 17 in `eu-west-1`.
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Magic link is the Phase 1 default per `products/dashboard/.env.example`.
# Supabase's default magic-link template is fine for now; add a custom
# `[auth.email.template.magic_link]` block here once we have a template
# file under `products/dashboard/supabase/templates/` to point at.

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
