# Provider-agnostic logical interfaces agents should implement or call via adapters.
version: "1.0.0"

interfaces:
  read_spec:
    description: "Load canonical spec from repo or registry."
    inputs:
      path:
        type: string
    outputs:
      spec:
        type: object

  validate_spec:
    description: "Validate a spec instance against product-spec.schema.json."
    inputs:
      instance:
        type: object
    outputs:
      valid:
        type: boolean
      errors:
        type: array

  emit_event:
    description: "Emit a structured domain event with envelope fields."
    inputs:
      name:
        type: string
      payload:
        type: object
      correlation_id:
        type: string
      occurred_at:
        type: string
        format: date-time
      emitted_by:
        type: string
    outputs:
      accepted:
        type: boolean

  record_error:
    description: "Send an error to the error tracking system."
    inputs:
      error:
        type: object
      fingerprint_tags:
        type: array

  capture_metric:
    description: "Capture product analytics event."
    inputs:
      key:
        type: string
      properties:
        type: object

  review_pull_request:
    description: >
      Produce machine-readable PR review findings for policy checks. Implementations
      (Copilot UI, SaaS bots, or scripts/review-adapter.mjs) MUST output JSON valid
      against spec/schema/review-findings.schema.json. Residual tier MUST be merged
      with P1 guardrails (see scripts/review-adapter.mjs); workflow p1-apply-residual
      maps residual_assessment.level to GitHub labels.
    inputs:
      diff_text:
        type: string
      initial_risk:
        type: string
        description: "Path-based tier: low | med | high (P1 initial risk)."
      repository_instructions_path:
        type: string
        description: "e.g. .github/copilot-instructions.md"
      pull_request:
        type: object
        description: "Optional metadata: number, base_sha, head_sha, refs."
      provider:
        type: string
        description: "Logical backend id: stub, anthropic, openai, etc."
    outputs:
      findings_document:
        type: object
        description: "Validated review-findings v1.0.0 document including residual_assessment."

policies:
  human_in_the_loop:
    required_for:
      - "Breaking schema migrations"
      - "PII policy changes"
      - "Security-sensitive tool grants"
