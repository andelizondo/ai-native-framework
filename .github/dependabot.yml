version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    target-branch: "main"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - automerge
    commit-message:
      prefix: chore
      include: scope
    groups:
      npm-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "main"
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - automerge
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
