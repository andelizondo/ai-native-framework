name: p1-policy

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, edited, dismissed]
  workflow_run:
    workflows:
      - validate-spec
      - p1-risk-classification
      - p1-apply-residual
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  decide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          REQUIRED_CHECK: validate
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function getPrNumber() {
              if (context.eventName === 'pull_request_target') {
                return context.payload.pull_request.number;
              }
              if (context.eventName === 'pull_request_review') {
                return context.payload.pull_request.number;
              }
              if (context.eventName === 'workflow_run') {
                const prs = context.payload.workflow_run.pull_requests || [];
                return prs.length > 0 ? prs[0].number : null;
              }
              return null;
            }

            const prNumber = getPrNumber();
            if (!prNumber) {
              core.info('No pull request is associated with this event.');
              return;
            }

            const data = await github.graphql(
              `
                query PullRequestPolicy($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      id
                      number
                      state
                      isDraft
                      mergeStateStatus
                      headRefOid
                      labels(first: 30) {
                        nodes { name }
                      }
                      latestReviews(first: 20) {
                        nodes {
                          state
                          author {
                            login
                          }
                        }
                      }
                    }
                  }
                }
              `,
              { owner, repo, number: prNumber },
            );

            const pr = data.repository.pullRequest;
            if (!pr || pr.state !== 'OPEN' || pr.isDraft) {
              core.info('Pull request is not open and ready for policy evaluation.');
              return;
            }

            const labels = pr.labels.nodes.map((label) => label.name);
            if (labels.includes('sync:needed') || pr.mergeStateStatus === 'BEHIND') {
              core.setFailed('PR is behind the protected base branch and must be updated before policy can pass.');
              return;
            }

            const checksResponse = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: pr.headRefOid,
              per_page: 100,
            });

            const requiredCheck = process.env.REQUIRED_CHECK;
            const validateCheck = checksResponse.data.check_runs.find(
              (checkRun) => checkRun.name === requiredCheck,
            );

            if (!validateCheck || validateCheck.status !== 'completed' || validateCheck.conclusion !== 'success') {
              core.setFailed(`Required check ${requiredCheck} is not successful.`);
              return;
            }

            const residual = labels.find((label) => ['residual:low', 'residual:med', 'residual:high'].includes(label));
            if (!residual) {
              core.setFailed('Residual risk has not been set yet.');
              return;
            }

            if (residual === 'residual:low') {
              core.info('Residual risk is low; policy check passes without human approval.');
              return;
            }

            const humanApproved = pr.latestReviews.nodes.some((review) =>
              review.state === 'APPROVED' && review.author && !review.author.login.endsWith('[bot]'),
            );

            if (!humanApproved) {
              core.setFailed('Residual risk requires a human approval before merge.');
              return;
            }

            core.info('Residual risk requires human approval and one is present; policy check passes.');
