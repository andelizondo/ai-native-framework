name: p1-policy

# Required check: decide
#
# Policy decision engine. Reads labels set by the risk classification and residual
# risk engine, verifies all evidence gates, and either passes the check or emits
# a structured decision request for the human.
#
# Humans receive a specific, bounded decision request — not an open-ended review task.
# The check fails closed whenever required evidence is missing, pending, or failed on the
# current head SHA. That makes `decide` a belt-and-suspenders merge blocker even when host
# branch protection is absent or misconfigured.
#
# `pull_request_target` often runs while `validate-spec` is still in flight on the same SHA.
# `decide` waits up to P1_POLICY_VALIDATE_WAIT_SECONDS (default 180s) before failing on
# in-progress validation. Optional: P1_POLICY_VALIDATE_POLL_INTERVAL_SECONDS (default 10s).
#
# When the configured reviewer reports success via commit status (e.g. CodeRabbit) but never
# submits a GitHub Review, `p1-residual-risk-engine` does not run; `decide` applies the same
# residual outcomes as that workflow for the status-only path.
#
# Required reviewer status contexts (e.g. Qodo Code Review) are configured via
# REQUIRED_AI_REVIEW_STATUS_CONTEXTS. When empty (the default), the status-check gate is skipped
# and reviewer evidence is detected solely via GitHub Review objects or PR-level comments from a
# configured AI reviewer bot.
#
# Low-risk PRs (risk:low or risk:med without control-plane) bypass the reviewer gate entirely.
# p1-policy sets residual:low directly for those PRs without waiting for any reviewer.
#
# For risk:high (or risk:med control-plane) PRs, the executing agent is expected to trigger Qodo
# Code Review manually (posting /agentic_describe + /agentic_review on the PR) before the human
# decision request. When Qodo posts its comment, the issue_comment trigger re-runs decide so the
# comment-evidence path can set residual:high and post the human decision request.
#
# The residual risk engine may set `residual:*` slightly after `decide` starts on the same event chain.
# After other gates, `decide` refreshes issue labels, then polls until a `residual:*` label appears or
# P1_POLICY_RESIDUAL_LABEL_WAIT_SECONDS (default 180s) elapses. Poll interval:
# P1_POLICY_RESIDUAL_LABEL_POLL_INTERVAL_SECONDS (default 10s).
#
# Concurrency: the same head SHA is often reached by many events at once (e.g. `pull_request_target` +
# `pull_request_review` + several `workflow_run` completions). Without a group, multiple `decide` jobs
# poll in parallel (wasting minutes) and the commit shows many duplicate green `decide` checks. One
# run per head SHA is enough; cancel in-flight duplicates.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issue_comment:
    types: [created]

concurrency:
  group: p1-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: read
  issues: write
  pull-requests: write

jobs:
  decide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        env:
          REQUIRED_CHECK: validate
          P1_POLICY_VALIDATE_WAIT_SECONDS: ${{ vars.P1_POLICY_VALIDATE_WAIT_SECONDS || '180' }}
          P1_POLICY_VALIDATE_POLL_INTERVAL_SECONDS: ${{ vars.P1_POLICY_VALIDATE_POLL_INTERVAL_SECONDS || '10' }}
          P1_POLICY_REVIEWER_STATUS_WAIT_SECONDS: ${{ vars.P1_POLICY_REVIEWER_STATUS_WAIT_SECONDS || '900' }}
          P1_POLICY_REVIEWER_STATUS_POLL_INTERVAL_SECONDS: ${{ vars.P1_POLICY_REVIEWER_STATUS_POLL_INTERVAL_SECONDS || '10' }}
          P1_POLICY_RESIDUAL_LABEL_WAIT_SECONDS: ${{ vars.P1_POLICY_RESIDUAL_LABEL_WAIT_SECONDS || '180' }}
          P1_POLICY_RESIDUAL_LABEL_POLL_INTERVAL_SECONDS: ${{ vars.P1_POLICY_RESIDUAL_LABEL_POLL_INTERVAL_SECONDS || '10' }}
          CONFIGURED_AI_REVIEWERS: ${{ vars.CONFIGURED_AI_REVIEWERS || 'qodo-code-review' }}
          REQUIRED_AI_REVIEW_STATUS_CONTEXTS: ${{ vars.REQUIRED_AI_REVIEW_STATUS_CONTEXTS || '' }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function sleepMs(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            async function getPrNumber() {
              if (context.eventName === 'pull_request_target') {
                return context.payload.pull_request.number;
              }
              if (context.eventName === 'pull_request_review') {
                return context.payload.pull_request.number;
              }
              if (context.eventName === 'issue_comment') {
                const issue = context.payload.issue;
                if (!issue?.pull_request) return null; // not a PR comment
                const comment = context.payload.comment;
                const login = (comment?.user?.login ?? '').replace(/\[bot\]$/i, '').toLowerCase();
                const configuredLogins = new Set(
                  (process.env.CONFIGURED_AI_REVIEWERS || '')
                    .split(',').map((s) => s.trim().replace(/\[bot\]$/i, '').toLowerCase()).filter(Boolean),
                );
                if (comment?.user?.type !== 'Bot' || !configuredLogins.has(login)) return null;
                return issue.number;
              }
              return null;
            }

            const prNumber = await getPrNumber();
            if (!prNumber) {
              core.info('No pull request is associated with this event.');
              return;
            }

            const data = await github.graphql(
              `
                query PullRequestPolicy($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    owner {
                      __typename
                      login
                    }
                    pullRequest(number: $number) {
                      id
                      number
                      title
                      state
                      isDraft
                      mergeStateStatus
                      headRefOid
                      headRefName
                      author {
                        login
                      }
                    }
                  }
                }
              `,
              { owner, repo, number: prNumber },
            );

            const repository = data.repository;
            const pr = repository.pullRequest;
            if (!pr || pr.state !== 'OPEN' || pr.isDraft) {
              core.info('Pull request is not open and ready for policy evaluation.');
              return;
            }

            const headRefName = pr.headRefName ?? '';
            const baseRefName = context.payload.pull_request?.base?.ref ?? '';
            const prActorLogin = (context.payload.pull_request?.user?.login ?? '').toLowerCase();
            const prActorType = context.payload.pull_request?.user?.type ?? '';
            const triggerActorLogin = (context.actor ?? '').toLowerCase();
            const trustedAutomationLogins = new Set([
              'github-actions[bot]',
              'dependabot[bot]',
              'release-please[bot]',
            ]);
            const isTrustedAutomationActor =
              prActorType === 'Bot' ||
              trustedAutomationLogins.has(prActorLogin) ||
              trustedAutomationLogins.has(triggerActorLogin);
            const isReleasePleaseAutomation =
              headRefName.startsWith('release-please') && isTrustedAutomationActor;
            const isStagingPromotion =
              headRefName === 'staging' && baseRefName === 'main' && isTrustedAutomationActor;
            const isBackMergeAutomation =
              /^chore\/back-merge-main-after-/.test(headRefName) &&
              baseRefName === 'staging' &&
              isTrustedAutomationActor;

            const marker = '<!-- p1-policy-decision -->';

            async function upsertPolicyComment(body) {
              const finalBody = [marker, body].join('\n');
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              });
              const existing = comments.find(
                (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: finalBody,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: finalBody,
              });
            }

            const configuredReviewerLogins = new Set(
              (process.env.CONFIGURED_AI_REVIEWERS || '')
                .split(',')
                .map((s) => s.trim().replace(/\[bot\]$/i, '').toLowerCase())
                .filter(Boolean),
            );

            function normalizeLogin(login) {
              return (login ?? '').replace(/\[bot\]$/i, '').toLowerCase();
            }

            function latestByStartedAt(items, getStartedAt) {
              return [...items].sort(
                (a, b) => new Date(getStartedAt(b) || 0).getTime() - new Date(getStartedAt(a) || 0).getTime(),
              )[0] ?? null;
            }

            function isConfiguredAiReview(review) {
              const rawLogin = review.user?.login ?? review.author?.login ?? '';
              const type = review.user?.type ?? review.author?.type;
              const login = normalizeLogin(rawLogin);
              return type === 'Bot' && configuredReviewerLogins.has(login);
            }

            function isConfiguredAiComment(comment) {
              const rawLogin = comment.user?.login ?? comment.author?.login ?? '';
              const type = comment.user?.type ?? comment.author?.type;
              const login = normalizeLogin(rawLogin);
              return type === 'Bot' && configuredReviewerLogins.has(login);
            }

            function commentMentionsHeadSha(comment, headSha) {
              const body = comment.body ?? '';
              return body.includes(headSha) || body.includes(headSha.slice(0, 7));
            }

            async function loadIssueLabelNames() {
              const labelNodes = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              });
              return labelNodes.map((label) => label.name);
            }

            let labels = await loadIssueLabelNames();
            let risk = labels.find((label) => ['risk:low', 'risk:med', 'risk:high'].includes(label));

            // ── Gate 1: Branch freshness ─────────────────────────────────────────────
            // If the branch is behind and sync:needed is missing, apply it so p1-branch-sync can run.
            // Without this, policy would block indefinitely since p1-branch-sync only triggers on the label.
            if (pr.mergeStateStatus === 'BEHIND' && !labels.includes('sync:needed')) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['sync:needed'] });
              labels = [...labels, 'sync:needed'];
            }

            if (labels.includes('sync:needed') || pr.mergeStateStatus === 'BEHIND') {
              const isActivelySyncing = pr.mergeStateStatus === 'BEHIND' && labels.includes('sync:needed');
              const syncMessage = isActivelySyncing
                ? 'The `sync:needed` label has been applied. `p1-branch-sync` will rebase same-repo branches automatically, or post exact commands for forks. If a conflict was reported, resolve it and push.'
                : '`sync:needed` is present. Waiting for `p1-branch-sync` to complete. Policy will re-evaluate on the updated head.';
              await upsertPolicyComment([
                '**P1 policy:** blocked — branch out of date',
                '',
                syncMessage,
              ].join('\n'));
              core.setFailed('PR is behind the protected base branch. Waiting for p1-branch-sync to resolve.');
              return;
            }

            // ── Gate 2: Required validation check ────────────────────────────────────
            const requiredCheck = process.env.REQUIRED_CHECK;
            const validateWaitMaxMs =
              Math.max(0, parseInt(process.env.P1_POLICY_VALIDATE_WAIT_SECONDS || '180', 10)) * 1000;
            const validatePollMs =
              Math.max(5, parseInt(process.env.P1_POLICY_VALIDATE_POLL_INTERVAL_SECONDS || '10', 10)) * 1000;

            async function fetchLatestValidateCheck() {
              const resp = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: pr.headRefOid,
                per_page: 100,
              });
              return latestByStartedAt(
                resp.data.check_runs.filter((checkRun) => checkRun.name === requiredCheck),
                (checkRun) => checkRun.started_at,
              );
            }

            let validateCheck = await fetchLatestValidateCheck();

            if (!validateCheck) {
              core.info(
                `Required check '${requiredCheck}' is not registered yet on ${pr.headRefOid.slice(0, 7)}; deferring (validate gate still blocks merge).`,
              );
              await upsertPolicyComment([
                '**P1 policy:** blocked — validation not registered yet',
                '',
                `Head \`${pr.headRefOid.slice(0, 7)}\`: no \`${requiredCheck}\` check run is visible on this SHA yet.`,
                '',
                '`decide` fails closed until the expected validation check is visible for the current head SHA.',
              ].join('\n'));
              core.setFailed(`Required check ${requiredCheck} is not registered yet on the current head SHA.`);
              return;
            }

            let waitedValidate = 0;
            while (validateCheck && validateCheck.status !== 'completed' && waitedValidate < validateWaitMaxMs) {
              core.info(
                `Required check '${requiredCheck}' is still ${validateCheck.status} on ${pr.headRefOid.slice(0, 7)}; waiting ${validatePollMs}ms (${Math.round(
                  waitedValidate / 1000,
                )}s / ${Math.round(validateWaitMaxMs / 1000)}s max).`,
              );
              await sleepMs(validatePollMs);
              waitedValidate += validatePollMs;
              validateCheck = await fetchLatestValidateCheck();
            }

            if (!validateCheck || validateCheck.status !== 'completed') {
              await upsertPolicyComment([
                '**P1 policy:** blocked — validation in progress',
                '',
                `Head \`${pr.headRefOid.slice(0, 7)}\`: \`${requiredCheck}\` did not reach \`completed\` within the wait window.`,
                '',
                '`decide` fails closed until validation completes successfully on the current head SHA.',
              ].join('\n'));
              core.setFailed(`Required check ${requiredCheck} is still in progress on the current head SHA after waiting.`);
              return;
            }

            if (validateCheck.conclusion !== 'success') {
              await upsertPolicyComment([
                '**P1 policy:** blocked — required check failing',
                '',
                `The \`${requiredCheck}\` check did not pass on the current head \`${pr.headRefOid.slice(0, 7)}\`.`,
                '',
                '**What to do**',
                `Fix the failures reported by \`${requiredCheck}\` and push a new commit. Automation will re-evaluate on the new head.`,
                '',
                'If the failure is a flaky test unrelated to this PR, re-run the check manually.',
              ].join('\n'));
              core.setFailed(`Required check ${requiredCheck} is not successful.`);
              return;
            }

            // Refresh labels: risk classification may have completed since policy started.
            labels = await loadIssueLabelNames();
            risk = labels.find((label) => ['risk:low', 'risk:med', 'risk:high'].includes(label));

            // Low-risk fast path: skip AI reviewer gate entirely.
            // risk:low and risk:med (without control-plane) auto-downgrade to residual:low without review.
            const isLowRiskPath =
              !isReleasePleaseAutomation &&
              !isStagingPromotion &&
              !isBackMergeAutomation &&
              (risk === 'risk:low' || (risk === 'risk:med' && !labels.includes('control-plane')));

            if (isLowRiskPath) {
              const existingResidual = labels.find((l) =>
                ['residual:low', 'residual:med', 'residual:high'].includes(l),
              );
              if (!existingResidual) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNumber, labels: ['residual:low'],
                });
                labels = await loadIssueLabelNames();
              }
              await upsertPolicyComment([
                '**P1 policy:** pass',
                '',
                `All gates satisfied. Residual risk: \`residual:low\`. No AI reviewer required for \`${risk}\` PRs.`,
                '',
                isReleasePleaseAutomation
                  ? 'Mergify will queue and merge this PR when the `release-please` queue conditions pass (`validate` and `decide` only).'
                  : 'Mergify will queue and merge this PR automatically when all required checks pass.',
              ].join('\n'));
              core.info(`Low-risk path (${risk}): skipping reviewer gate, residual:low set.`);
              return;
            }

            let reviewStatusContexts = (process.env.REQUIRED_AI_REVIEW_STATUS_CONTEXTS || '')
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean);
            if (isReleasePleaseAutomation || isStagingPromotion || isBackMergeAutomation) {
              reviewStatusContexts = [];
            }

            const reviewerStatusWaitMaxMs =
              Math.max(0, parseInt(process.env.P1_POLICY_REVIEWER_STATUS_WAIT_SECONDS || '900', 10)) * 1000;
            const reviewerStatusPollMs =
              Math.max(5, parseInt(process.env.P1_POLICY_REVIEWER_STATUS_POLL_INTERVAL_SECONDS || '10', 10)) * 1000;

            async function fetchLatestReviewerStatuses() {
              const sr = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: pr.headRefOid,
              });
              const ctxSet = new Set(reviewStatusContexts);
              const byContext = new Map();
              for (const status of sr.data.statuses) {
                if (!ctxSet.has(status.context)) continue;
                const prev = byContext.get(status.context);
                if (
                  !prev ||
                  new Date(status.created_at).getTime() > new Date(prev.created_at).getTime()
                ) {
                  byContext.set(status.context, status);
                }
              }
              return byContext;
            }

            let reviewerStatusesSatisfied = false;
            if (reviewStatusContexts.length > 0) {
              let latestByContext = await fetchLatestReviewerStatuses();
              let waitedReviewer = 0;
              while (waitedReviewer < reviewerStatusWaitMaxMs) {
                const unresolved = reviewStatusContexts.filter((name) => {
                  const st = latestByContext.get(name);
                  return !st || st.state === 'pending';
                });
                if (unresolved.length === 0) break;
                core.info(
                  `Required reviewer status(es) still missing or pending (${unresolved.join(', ')}) on ${pr.headRefOid.slice(0, 7)}; waiting ${reviewerStatusPollMs}ms (${Math.round(
                    waitedReviewer / 1000,
                  )}s / ${Math.round(reviewerStatusWaitMaxMs / 1000)}s shared budget).`,
                );
                await sleepMs(reviewerStatusPollMs);
                waitedReviewer += reviewerStatusPollMs;
                latestByContext = await fetchLatestReviewerStatuses();
              }

              for (const contextName of reviewStatusContexts) {
                const context = latestByContext.get(contextName);

                if (!context) {
                  await upsertPolicyComment([
                    '**P1 policy:** blocked — reviewer status missing (timeout)',
                    '',
                    `Head \`${pr.headRefOid.slice(0, 7)}\`: no status context named \`${contextName}\` appeared within the wait window.`,
                    '',
                    'Wait for the configured reviewer to register a status on this SHA, or increase `P1_POLICY_REVIEWER_STATUS_WAIT_SECONDS` if reviews routinely start later.',
                  ].join('\n'));
                  core.setFailed(`Required reviewer status context ${contextName} did not appear within the wait window.`);
                  return;
                }

                if (context.state === 'pending') {
                  await upsertPolicyComment([
                    '**P1 policy:** blocked — reviewer status pending (timeout)',
                    '',
                    `Head \`${pr.headRefOid.slice(0, 7)}\`: reviewer status context \`${contextName}\` stayed pending longer than the configured wait window.`,
                    '',
                    'If the reviewer is still running, increase `P1_POLICY_REVIEWER_STATUS_WAIT_SECONDS` or wait for it to finish and re-run `decide` via a follow-up workflow event.',
                  ].join('\n'));
                  core.setFailed(`Required reviewer status context ${contextName} stayed pending beyond the wait window.`);
                  return;
                }

                if (context.state !== 'success') {
                  await upsertPolicyComment([
                    '**P1 policy:** blocked — reviewer status failing',
                    '',
                    `Head \`${pr.headRefOid.slice(0, 7)}\`: reviewer status context \`${contextName}\` is \`${context.state}\`.`,
                    '',
                    'Fix the reviewer-reported issue or re-run the reviewer before merge.',
                  ].join('\n'));
                  core.setFailed(`Required reviewer status context ${contextName} is ${context.state} on the current head SHA.`);
                  return;
                }
              }
              reviewerStatusesSatisfied = true;
            }

            async function hasUnresolvedThreads() {
              let after = null;
              while (true) {
                const threadData = await github.graphql(
                  `
                    query ReviewThreads($owner: String!, $repo: String!, $number: Int!, $after: String) {
                      repository(owner: $owner, name: $repo) {
                        pullRequest(number: $number) {
                          reviewThreads(first: 100, after: $after) {
                            nodes { isResolved isOutdated }
                            pageInfo { hasNextPage endCursor }
                          }
                        }
                      }
                    }
                  `,
                  { owner, repo, number: prNumber, after },
                );
                const rt = threadData.repository.pullRequest.reviewThreads;
                const { nodes, pageInfo } = rt;
                if (nodes.some((t) => !t.isResolved && !t.isOutdated)) return true;
                if (!pageInfo.hasNextPage) return false;
                after = pageInfo.endCursor;
              }
            }

            // ── Gate 3: configured AI review evidence ───────────────────────────────
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const aiReviews = reviews.filter((review) => isConfiguredAiReview(review));
            const aiOnHead = aiReviews
              .filter((r) => r.commit_id === pr.headRefOid && r.state !== 'DISMISSED')
              .sort((a, b) => new Date(b.submitted_at).getTime() - new Date(a.submitted_at).getTime());
            const latestAiOnHead = aiOnHead[0] ?? null;
            const prComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            // Note: head SHA check omitted — Qodo code review comments don't include the SHA.
            // Bot type + configured login is specific enough to avoid false positives.
            const aiCommentOnHead = prComments
              .filter((comment) => isConfiguredAiComment(comment))
              .sort((a, b) => new Date(b.created_at).getTime() - new Date(a.created_at).getTime())[0] ?? null;
            const latestAiEvidence = latestAiOnHead ?? aiCommentOnHead;

            const latestAiByReviewer = new Map();
            for (const r of aiOnHead) {
              const login = normalizeLogin(r.user?.login ?? r.author?.login);
              if (!latestAiByReviewer.has(login)) {
                latestAiByReviewer.set(login, r);
              }
            }
            const freshAiReviews = [...latestAiByReviewer.values()];
            const hasChangesRequestedOnHead = freshAiReviews.some((r) => r.state === 'CHANGES_REQUESTED');

            const hasFreshAiReview =
              isReleasePleaseAutomation ||
              isStagingPromotion ||
              isBackMergeAutomation ||
              latestAiEvidence != null ||
              (reviewerStatusesSatisfied && reviewStatusContexts.length > 0 && !hasChangesRequestedOnHead);

            if (!hasFreshAiReview) {
              core.info(
                `No configured AI review on head ${pr.headRefOid.slice(0, 7)} yet; failing closed until review evidence appears.`,
              );
              await upsertPolicyComment([
                '**P1 policy:** blocked — configured reviewer evidence pending',
                '',
                `Waiting for a configured AI reviewer to leave current-head output on \`${pr.headRefOid.slice(0, 7)}\` (a review or comment on that SHA${
                  reviewStatusContexts.length > 0
                    ? `, or successful required reviewer status contexts such as \`${reviewStatusContexts.join('`, `')}\` with no \`CHANGES_REQUESTED\` review from a configured reviewer on that SHA`
                    : ''
                }).`,
                '',
                '`decide` fails closed until reviewer output is observable on the current head SHA. Wait for the automatic reviewer run first. If no reviewer signal appears after roughly 15 seconds, a manual reviewer command is allowed; if review has already started, poll up to 5 minutes and then ask the user before triggering recovery.',
                '',
                'Use a manual reviewer command only for a missing trigger after the short initial wait, or after the 5-minute in-progress wait window with explicit user approval.',
              ].join('\n'));
              core.setFailed('Configured AI review has not been observed on the current head SHA yet.');
              return;
            }

            // ── Gate 4: Residual risk label ───────────────────────────────────────────
            // Refresh labels: upstream workflows may have updated them during validate/reviewer waits.
            labels = await loadIssueLabelNames();
            risk = labels.find((label) => ['risk:low', 'risk:med', 'risk:high'].includes(label));

            if (isReleasePleaseAutomation) {
              const existingResidual = labels.find((label) =>
                ['residual:low', 'residual:med', 'residual:high'].includes(label),
              );
              if (
                !existingResidual &&
                risk &&
                risk !== 'risk:high' &&
                !labels.includes('control-plane') &&
                !labels.includes('autofix:pending')
              ) {
                const unresolved = await hasUnresolvedThreads();
                if (unresolved) {
                  await upsertPolicyComment([
                    '**P1 policy:** blocked — open review threads',
                    '',
                    'This release automation pull request has unresolved review threads. Resolve or dismiss them before merge.',
                  ].join('\n'));
                  core.setFailed('Release automation PR has unresolved review threads.');
                  return;
                }
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['residual:low'],
                });
                labels = await loadIssueLabelNames();
              }
            }

            // The residual risk engine (p1-residual-risk-engine) sets this automatically.
            // If it is not yet set, either the engine hasn't run or a race condition exists.
            let residual = labels.find((label) => ['residual:low', 'residual:med', 'residual:high'].includes(label));

            // Convergence: if risk:low and a configured AI reviewer approved/commented but residual not yet set,
            // assign it only after review threads are resolved or outdated.
            // Only applies for APPROVED/COMMENTED — not CHANGES_REQUESTED, which the residual engine must handle.
            const hasApprovalLikeOnHead = freshAiReviews.some(
              (r) => r.state === 'APPROVED' || r.state === 'COMMENTED',
            );
            const aiReviewerAllowsFallback = !hasChangesRequestedOnHead && hasApprovalLikeOnHead;
            const autofixApplied = labels.includes('autofix:applied');

            if (!residual && risk === 'risk:low' && aiReviewerAllowsFallback) {
              const unresolved = await hasUnresolvedThreads();
              if (unresolved) {
                if (!autofixApplied) {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: prNumber,
                    labels: ['autofix:pending'],
                  });
                } else {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: prNumber,
                    name: 'autofix:pending',
                  }).catch((error) => {
                    if (error.status !== 404) throw error;
                  });
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: prNumber,
                    labels: ['residual:med'],
                  });
                  residual = 'residual:med';
                }
              } else {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name: 'autofix:pending',
                }).catch((error) => {
                  if (error.status !== 404) throw error;
                });
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['residual:low'],
                });
                residual = 'residual:low';
              }
            }

            const statusOnlyEvidence =
              reviewerStatusesSatisfied &&
              reviewStatusContexts.length > 0 &&
              aiOnHead.length === 0;

            if (!residual && statusOnlyEvidence && risk) {
              const isControlPlane = labels.includes('control-plane');

              if (risk === 'risk:high') {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['residual:high'],
                });
                residual = 'residual:high';
              } else if (risk === 'risk:med') {
                if (isControlPlane) {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: prNumber,
                    labels: ['residual:med'],
                  });
                  residual = 'residual:med';
                } else {
                  const unresolved = await hasUnresolvedThreads();
                  if (unresolved) {
                    if (!autofixApplied) {
                      await github.rest.issues.addLabels({
                        owner,
                        repo,
                        issue_number: prNumber,
                        labels: ['autofix:pending'],
                      });
                    } else {
                      await github.rest.issues.addLabels({
                        owner,
                        repo,
                        issue_number: prNumber,
                        labels: ['residual:med'],
                      });
                      residual = 'residual:med';
                    }
                  } else {
                    await github.rest.issues.addLabels({
                      owner,
                      repo,
                      issue_number: prNumber,
                      labels: ['residual:low'],
                    });
                    residual = 'residual:low';
                  }
                }
              } else if (risk === 'risk:low') {
                const unresolved = await hasUnresolvedThreads();
                if (unresolved) {
                  if (!autofixApplied) {
                    await github.rest.issues.addLabels({
                      owner,
                      repo,
                      issue_number: prNumber,
                      labels: ['autofix:pending'],
                    });
                  } else {
                    await github.rest.issues.removeLabel({
                      owner,
                      repo,
                      issue_number: prNumber,
                      name: 'autofix:pending',
                    }).catch((error) => {
                      if (error.status !== 404) throw error;
                    });
                    await github.rest.issues.addLabels({
                      owner,
                      repo,
                      issue_number: prNumber,
                      labels: ['residual:med'],
                    });
                    residual = 'residual:med';
                  }
                } else {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: prNumber,
                    name: 'autofix:pending',
                  }).catch((error) => {
                    if (error.status !== 404) throw error;
                  });
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: prNumber,
                    labels: ['residual:low'],
                  });
                  residual = 'residual:low';
                }
              }
            }

            // Comment-only reviewer path: configured reviewer left a comment but submitted no formal
            // GitHub Review and no status check is required (e.g. Qodo Code Review on risk:high PRs).
            if (!residual) {
              const commentOnlyEvidence =
                reviewStatusContexts.length === 0 &&
                aiOnHead.length === 0 &&
                aiCommentOnHead != null;

              if (commentOnlyEvidence && risk) {
                const isControlPlaneLoc = labels.includes('control-plane');
                if (risk === 'risk:high') {
                  await github.rest.issues.addLabels({
                    owner, repo, issue_number: prNumber, labels: ['residual:high'],
                  });
                  residual = 'residual:high';
                } else if (isControlPlaneLoc) {
                  await github.rest.issues.addLabels({
                    owner, repo, issue_number: prNumber, labels: ['residual:med'],
                  });
                  residual = 'residual:med';
                } else {
                  const unresolved = await hasUnresolvedThreads();
                  if (unresolved) {
                    if (!autofixApplied) {
                      await github.rest.issues.addLabels({
                        owner, repo, issue_number: prNumber, labels: ['autofix:pending'],
                      });
                    } else {
                      await github.rest.issues.removeLabel({
                        owner, repo, issue_number: prNumber, name: 'autofix:pending',
                      }).catch((e) => { if (e.status !== 404) throw e; });
                      await github.rest.issues.addLabels({
                        owner, repo, issue_number: prNumber, labels: ['residual:med'],
                      });
                      residual = 'residual:med';
                    }
                  } else {
                    await github.rest.issues.removeLabel({
                      owner, repo, issue_number: prNumber, name: 'autofix:pending',
                    }).catch((e) => { if (e.status !== 404) throw e; });
                    await github.rest.issues.addLabels({
                      owner, repo, issue_number: prNumber, labels: ['residual:low'],
                    });
                    residual = 'residual:low';
                  }
                }
              }
            }

            if (!residual) {
              const residualWaitMaxMs =
                Math.max(0, parseInt(process.env.P1_POLICY_RESIDUAL_LABEL_WAIT_SECONDS || '180', 10)) * 1000;
              const residualPollMs =
                Math.max(5, parseInt(process.env.P1_POLICY_RESIDUAL_LABEL_POLL_INTERVAL_SECONDS || '10', 10)) * 1000;
              let waitedResidual = 0;
              labels = await loadIssueLabelNames();
              residual = labels.find((label) =>
                ['residual:low', 'residual:med', 'residual:high'].includes(label),
              );
              while (!residual && waitedResidual < residualWaitMaxMs) {
                core.info(
                  `Residual risk label not on issue yet; waiting ${residualPollMs}ms (${Math.round(
                    waitedResidual / 1000,
                  )}s / ${Math.round(residualWaitMaxMs / 1000)}s max).`,
                );
                const sleepForMs = Math.min(residualPollMs, residualWaitMaxMs - waitedResidual);
                await sleepMs(sleepForMs);
                waitedResidual += sleepForMs;
                labels = await loadIssueLabelNames();
                residual = labels.find((label) =>
                  ['residual:low', 'residual:med', 'residual:high'].includes(label),
                );
              }
            }

            if (!residual) {
              await upsertPolicyComment([
                '**P1 policy:** blocked — residual risk pending',
                '',
                'Configured AI review evidence is present, but the residual risk engine has not yet set a `residual:*` label.',
                '',
                '`decide` refreshed labels and waited within `P1_POLICY_RESIDUAL_LABEL_WAIT_SECONDS`; increase that variable if the engine routinely lands later.',
                '',
                '`decide` fails closed until the residual risk engine updates the current head SHA.',
              ].join('\n'));
              core.setFailed('Residual risk label is not set yet on the current head SHA.');
              return;
            }

            // ── Decision: residual:low → pass ─────────────────────────────────────────
            if (residual === 'residual:low') {
              await upsertPolicyComment([
                '**P1 policy:** pass',
                '',
                `All gates satisfied. Residual risk: \`${residual}\`. Configured AI review evidence is present on \`${pr.headRefOid.slice(0, 7)}\`. No human approval required.`,
                '',
                isReleasePleaseAutomation
                  ? 'Mergify will queue and merge this PR when the `release-please` queue conditions pass (`validate` and `decide` only).'
                  : 'Mergify will queue and merge this PR automatically when all required checks pass.',
              ].join('\n'));
              core.info('Residual risk is low; policy check passes without human approval.');
              return;
            }

            // ── Decision: residual:med or residual:high → check for human approval ────
            const repoOwner = repository.owner;
            const repoIsPersonal = repoOwner?.__typename === 'User';
            const prAuthorLogin = pr.author?.login;
            const ownerSelfClearAllowed =
              repoIsPersonal &&
              prAuthorLogin &&
              repoOwner?.login === prAuthorLogin &&
              residual === 'residual:med';

            if (ownerSelfClearAllowed) {
              // Personal repo owner path: policy passes, owner decides at merge time.
              await upsertPolicyComment([
                '**P1 policy:** pass — owner decision path',
                '',
                `Residual risk: \`${residual}\`. All required evidence gates pass. This is a personal repository and the PR author is the owner.`,
                '',
                '**Decision needed from you**',
                'Review the automated findings and choose one option:',
                '1. **Approve and merge** — add your GitHub approval; merge proceeds automatically.',
                '2. **Push changes** — address any concerns and push; automation resumes on the new head.',
                '3. **Close** — reject this PR.',
              ].join('\n'));
              core.info('Residual medium is allowed for the owner of a personal repository after evidence gates pass.');
              return;
            }

            // Check if a human has already approved this head.
            const humanApproved = reviews.some((review) =>
              review.state === 'APPROVED' &&
              review.user &&
              review.user.type !== 'Bot' &&
              review.commit_id === pr.headRefOid,
            );

            if (humanApproved) {
              await upsertPolicyComment([
                '**P1 policy:** pass',
                '',
                `Residual risk: \`${residual}\`. Human approval is present on \`${pr.headRefOid.slice(0, 7)}\`. All gates satisfied.`,
              ].join('\n'));
              core.info('Residual risk requires human approval and one is present; policy check passes.');
              return;
            }

            // No human approval yet. Emit a structured decision request (P1 section 5 format).
            const aiReview = latestAiOnHead;
            const aiEvidence = latestAiOnHead ?? aiCommentOnHead;
            const reviewerEvidenceSummary = aiEvidence
              ? `\`${aiEvidence.user?.login ?? aiEvidence.author?.login ?? 'unknown'}\` left current-head output on \`${pr.headRefOid.slice(0, 7)}\``
              : `required reviewer status contexts succeeded on \`${pr.headRefOid.slice(0, 7)}\` (no GitHub Review on this SHA)`;
            const reviewBody = aiReview?.body?.trim() ?? aiCommentOnHead?.body?.trim() ?? '';
            const reviewSummary = reviewBody
              ? reviewBody.slice(0, 800) + (reviewBody.length > 800 ? '\n\n_(truncated — see full review on the PR timeline)_' : '')
              : '_No review body submitted by the configured reviewer._';

            const isHighRisk = residual === 'residual:high';
            const isControlPlane = labels.includes('control-plane');

            // Single-sentence decision statement (first line of the request).
            const decisionStatement = isHighRisk
              ? 'Approve or reject this PR — it touches high-risk production surfaces that automation cannot approve on its own.'
              : isControlPlane
              ? 'Approve or reject this PR — it modifies the automation control plane and cannot be auto-approved per policy.'
              : 'Approve or reject this PR — residual risk requires an explicit human decision before merge.';

            const stopReason = isHighRisk
              ? 'One or more changed paths are classified `risk:high` (auth, billing, secrets, migrations, or production infrastructure). These changes require an explicit human decision.'
              : isControlPlane
              ? 'The `control-plane` label is present. This PR modifies workflow files, branch protection, or review-policy logic. Per P1 §6.6, control-plane changes cannot be auto-downgraded to `residual:low`.'
              : `Residual risk is \`${residual}\` and repository policy requires a human checkpoint for this risk tier.`;

            // Build the remaining-items section from the reviewer body if available.
            const remainingItems = reviewBody
              ? [
                  'The configured AI reviewer findings are listed below. Review them and decide whether to approve or push fixes.',
                  '',
                  reviewSummary,
                ]
              : ['The configured AI reviewer submitted this review with no body. Check the PR timeline for inline comments.'];

            await upsertPolicyComment([
              '**P1 decision request**',
              '',
              decisionStatement,
              '',
              '**What changed**',
              pr.title,
              '',
              '**Why automation stopped**',
              stopReason,
              '',
              '**Automated verification (complete)**',
              `- ✓ Required checks: \`${requiredCheck}\` passed on \`${pr.headRefOid.slice(0, 7)}\``,
              `- ✓ Configured AI reviewer: ${reviewerEvidenceSummary}`,
              `- ✓ Branch: current with base`,
              ...(labels.includes('autofix:applied') ? ['- ✓ Resolution loop: ran (safe auto-fixes applied)'] : []),
              '',
              '**Remaining items requiring your decision**',
              ...remainingItems,
              '',
              '**Your options**',
              '1. **Approve** — add your GitHub approval; merge proceeds automatically once all required checks pass.',
              '2. **Request changes** — push a commit addressing the findings above; automation resumes on the new head.',
              '3. **Close** — reject this PR.',
            ].join('\n'));

            core.setFailed(`Residual risk is ${residual}; a human decision is required before merge.`);
