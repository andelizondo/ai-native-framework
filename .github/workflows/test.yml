name: test

# Runs Vitest (unit + component + integration). PRs always receive a `test`
# check so merge automation has a stable signal; the job no-ops when the PR does
# not touch `products/dashboard/**`. release-please version/changelog PRs skip
# this job; Mergify merges those via the `release-please` queue without a `test`
# check.
# This is a BLOCKING merge gate per docs/QUALITY_STANDARD.md §6.1.
# Coverage uploads to Codecov when CODECOV_TOKEN is set (see codecov.yml);
# Codecov status is informational by default and does not add a merge gate.
#
# Job name "test" is the check name that Mergify requires.

on:
  push:
    branches: [main, staging]
    paths:
      - "products/dashboard/**"
      - "codecov.yml"
  pull_request:
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/dashboard
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect dashboard changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          if printf '%s\n' "$changed_files" | grep -q '^products/dashboard/'; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.run_tests == 'true'
        with:
          node-version: "20.19"
          cache: "npm"
          cache-dependency-path: products/dashboard/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.run_tests == 'true'
        run: npm ci

      - name: Run Vitest (unit + component + integration) with coverage
        if: steps.changes.outputs.run_tests == 'true'
        run: npm run test:coverage

      - name: Skip dashboard tests
        if: steps.changes.outputs.run_tests != 'true'
        run: echo "No products/dashboard changes detected on this PR; passing test gate without running Vitest."

      - name: Upload coverage to Codecov
        if: steps.changes.outputs.run_tests == 'true'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: products/dashboard/coverage/lcov.info
          flags: dashboard
          name: dashboard-vitest
          fail_ci_if_error: false

      - name: Upload coverage report
        if: always() && steps.changes.outputs.run_tests == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: products/dashboard/coverage/
          retention-days: 7
