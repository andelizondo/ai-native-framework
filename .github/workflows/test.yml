name: test

# Runs Vitest (unit + component + integration) on every pull request.
# This is a BLOCKING merge gate per docs/QUALITY_STANDARD.md §6.1.
#
# Job name "test" is the check name that Mergify requires.

on:
  push:
    branches: [main]
    paths:
      - "products/dashboard/**"
  pull_request:
    paths:
      - "products/dashboard/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/dashboard
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: products/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (unit + component + integration)
        run: npm run test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: products/dashboard/coverage/
          retention-days: 7
