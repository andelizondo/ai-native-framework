name: sentry-release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sentry-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check Sentry release configuration
        id: sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        run: |
          missing=0

          for name in SENTRY_AUTH_TOKEN SENTRY_ORG SENTRY_PROJECT; do
            if [ -z "$(printenv "$name")" ]; then
              echo "::warning title=sentry-release disabled::$name is not configured. Skipping Sentry release sync for ${GITHUB_REF_NAME}."
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.sentry.outputs.configured == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Publish Sentry release
        if: steps.sentry.outputs.configured == 'true'
        uses: getsentry/action-release@5657c9e888b4e2cc85f4d29143ea4131fde4a73a # v3.6.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        with:
          environment: production
          release: ${{ github.event.release.tag_name }}
          set_commits: auto
          ignore_missing: true
          ignore_empty: true
