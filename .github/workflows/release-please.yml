name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Check release token configuration
        id: token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -n "$RELEASE_PLEASE_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::warning title=release-please disabled::RELEASE_PLEASE_TOKEN is not configured. Skipping release automation because PRs and tags created with GITHUB_TOKEN do not trigger downstream workflows in this repository."

      - name: Run release-please
        if: steps.token.outputs.configured == 'true'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
