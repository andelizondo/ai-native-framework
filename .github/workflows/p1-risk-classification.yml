name: p1-risk-classification

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  classify:
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const marker = '<!-- p1-risk-classification -->';
            const riskLabels = ['risk:low', 'risk:med', 'risk:high'];
            const syncLabel = 'sync:needed';

            const labelPalette = {
              'risk:low': '0e8a16',
              'risk:med': 'fbca04',
              'risk:high': 'd73a4a',
              'residual:low': '0e8a16',
              'residual:med': 'fbca04',
              'residual:high': 'd73a4a',
              'sync:needed': '5319e7',
            };

            for (const [name, color] of Object.entries(labelPalette)) {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                });
              } catch (error) {
                if (error.status !== 422) {
                  throw error;
                }
              }
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const paths = files.map((file) => file.filename);

            const { spawnSync } = require('child_process');
            const path = require('path');
            const root = process.env.GITHUB_WORKSPACE;
            const proc = spawnSync(process.execPath, [path.join(root, 'scripts', 'p1-risk-from-paths.mjs')], {
              cwd: root,
              input: paths.join('\n'),
              encoding: 'utf8',
            });
            if (proc.status !== 0) {
              core.setFailed(proc.stderr || proc.stdout || 'p1-risk-from-paths failed');
              return;
            }
            const { risk, reasons: uniqueReasons } = JSON.parse(proc.stdout);

            const riskLabel = `risk:${risk === 'medium' ? 'med' : risk}`;
            const currentLabels = pr.labels.map((label) => label.name);
            const isBehind = pr.mergeable_state === 'behind';

            for (const label of riskLabels) {
              if (currentLabels.includes(label) && label !== riskLabel) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pr.number,
                  name: label,
                }).catch((error) => {
                  if (error.status !== 404) {
                    throw error;
                  }
                });
              }
            }

            if (!currentLabels.includes(riskLabel)) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: [riskLabel],
              });
            }

            if (isBehind && !currentLabels.includes(syncLabel)) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: [syncLabel],
              });
            }

            if (!isBehind && currentLabels.includes(syncLabel)) {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: pr.number,
                name: syncLabel,
              }).catch((error) => {
                if (error.status !== 404) {
                  throw error;
                }
              });
            }

            const body = [
              marker,
              `P1 initial risk: **${risk}**.`,
              `Branch freshness: **${isBehind ? 'outdated' : 'current'}**.`,
              `Residual risk: **set by \`p1-apply-residual\` after \`p1-review-adapter\` finishes** (see \`review-findings.json\` artifact).`,
              '',
              `Changed files: ${paths.map((p) => `\`${p}\``).join(', ')}`,
              '',
              'Why:',
              ...(uniqueReasons.length > 0
                ? uniqueReasons.map((reason) => `- ${reason}`)
                : ['- All changed paths are currently within the low-risk allowlist.']),
              '',
              ...(isBehind
                ? [
                    'Freshness gate:',
                    '- This PR is behind the protected base branch and is labeled `sync:needed` until it is updated.',
                    '',
                  ]
                : []),
              'Authority under `docs/P1_PR_EXECUTION_LOOP.md`:',
              '- Initial risk sets review depth; residual risk is derived from automated review output plus guardrails.',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }
