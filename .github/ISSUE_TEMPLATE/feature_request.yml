name: Feature request
description: Propose a schema, policy, tooling, or documentation improvement.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap or friction are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed change.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Note schema, policy, docs, migration, or tooling implications.
